<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Gym Éire services - weights, classes and more">
<title>Services | Gym Éire</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&family=Lato&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Lato', sans-serif; background: #111; color: #eee; }
nav { background: #222; padding: 1rem; display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
.logo { font-family: 'Oswald', sans-serif; font-size: 1.5rem; color: #e63946; margin-right: auto; }
nav a { color: #eee; text-decoration: none; }
header { background: #e63946; padding: 3rem 1.5rem; text-align: center; }
header h1 { font-family: 'Oswald', sans-serif; font-size: 2.5rem; }
section { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
.btn {
  width: 100%;
  background: #222;
  color: #eee;
  padding: 1rem;
  margin: 0.5rem 0;
  border: none;
  border-left: 4px solid #e63946;
  font-size: 1.1rem;
  text-align: left;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
}
.btn:hover { background: #333; }
.panel { display: none; background: #1a1a1a; padding: 1rem; margin-bottom: 0.5rem; }
.panel img { width: 100%; border-radius: 6px; margin-bottom: 0.5rem; }
footer { text-align: center; padding: 1.5rem; background: #222; margin-top: 3rem; color: #888; }
</style>
</head>
<body>
<nav>
  <span class="logo">Gym Éire</span>
  <a href="index.html">Home</a>
  <a href="services.html">Services</a>
  <a href="locations.html">Locations</a>
  <a href="contact.html">Contact</a>
</nav>
<header><h1>Our Services</h1></header>
<section>

  <button class="btn" id="btn1">🏋️ Weight Training</button>
  <div class="panel" id="panel1">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/A_woman_doing_weight_training.jpg/640px-A_woman_doing_weight_training.jpg" alt="Weight Training">
    <p>Full free weights area and machine zone available at all locations.</p>
  </div>

  <button class="btn" id="btn2">🧘 Group Classes</button>
  <div class="panel" id="panel2">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/A_French_aerobics_class_in_2011.jpg/640px-A_French_aerobics_class_in_2011.jpg" alt="Group Classes">
    <p>Join our weekly yoga, HIIT and spin classes led by certified coaches.</p>
  </div>

  <button class="btn" id="btn3">🥊 Personal Training</button>
  <div class="panel" id="panel3">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/A_personal_trainer_helping_a_client.jpg/640px-A_personal_trainer_helping_a_client.jpg" alt="Personal Training">
    <p>One-to-one sessions tailored to your goals and fitness level.</p>
  </div>

</section>
<footer><p>© 2026 Gym Éire | gymeire.ie</p></footer>

<script>
document.getElementById("btn1").addEventListener("click", function() {
  var p = document.getElementById("panel1");
  p.style.display = p.style.display === "block" ? "none" : "block";
});
document.getElementById("btn2").addEventListener("click", function() {
  var p = document.getElementById("panel2");
  p.style.display = p.style.display === "block" ? "none" : "block";
});
document.getElementById("btn3").addEventListener("click", function() {
  var p = document.getElementById("panel3");
  p.style.display = p.style.display === "block" ? "none" : "block";
});
</script>

</body>
</html>
